<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Investing Research</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; }
        .tag { transition: all 0.15s ease; }
        .tag:hover { transform: translateY(-1px); }
        .card-link { transition: all 0.2s ease; }
        .card-link:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-16">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-4">Value Investing Research</h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto">Investment thesis, analysis, and educational resources grounded in Buffett-style value investing principles.</p>
        </header>
        <div id="filter-bar" class="flex flex-wrap justify-center gap-3 mb-10"></div>
        <div id="content"><p class="text-center text-slate-400">Loading...</p></div>
        <footer class="text-center mt-20 pt-8 border-t border-slate-200">
            <p class="text-sm text-slate-400">Research by Dubi Greenfeld</p>
        </footer>
    </div>
    <script>
        const COLOR_MAP = {
            indigo:  { gradient: 'from-indigo-600 to-purple-500',  badge: 'text-indigo-700 bg-indigo-50',  border: 'hover:border-indigo-200', tag: 'bg-indigo-50 text-indigo-600',  filterActive: 'bg-indigo-600 text-white',  filterInactive: 'bg-white text-indigo-600 border-indigo-200' },
            emerald: { gradient: 'from-emerald-500 to-teal-400',   badge: 'text-emerald-700 bg-emerald-50', border: 'hover:border-emerald-200', tag: 'bg-emerald-50 text-emerald-600', filterActive: 'bg-emerald-600 text-white', filterInactive: 'bg-white text-emerald-600 border-emerald-200' },
            amber:   { gradient: 'from-amber-500 to-orange-400',   badge: 'text-amber-700 bg-amber-50',    border: 'hover:border-amber-200',   tag: 'bg-amber-50 text-amber-600',    filterActive: 'bg-amber-600 text-white',   filterInactive: 'bg-white text-amber-600 border-amber-200' },
            rose:    { gradient: 'from-rose-500 to-pink-400',      badge: 'text-rose-700 bg-rose-50',      border: 'hover:border-rose-200',    tag: 'bg-rose-50 text-rose-600',      filterActive: 'bg-rose-600 text-white',    filterInactive: 'bg-white text-rose-600 border-rose-200' },
            sky:     { gradient: 'from-sky-500 to-blue-400',       badge: 'text-sky-700 bg-sky-50',        border: 'hover:border-sky-200',     tag: 'bg-sky-50 text-sky-600',        filterActive: 'bg-sky-600 text-white',     filterInactive: 'bg-white text-sky-600 border-sky-200' },
        };
        let data = null;
        let activeFilter = 'all';

        async function loadData() {
            const resp = await fetch('pages.json?v=' + Date.now());
            data = await resp.json();
            renderFilters();
            renderContent();
            lucide.createIcons();
        }

        function getColor(cat) {
            const c = data.categories[cat]?.color;
            return COLOR_MAP[c] || COLOR_MAP.sky;
        }

        function renderFilters() {
            const bar = document.getElementById('filter-bar');
            const cats = Object.keys(data.categories);
            let html = '<button onclick="setFilter(\'all\')" class="px-5 py-2 rounded-full text-sm font-medium border transition ' + (activeFilter === 'all' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-400') + '">All</button>';
            for (const key of cats) {
                const cat = data.categories[key];
                const color = getColor(key);
                const count = data.pages.filter(p => p.category === key).length;
                const isActive = activeFilter === key;
                html += '<button onclick="setFilter(\'' + key + '\')" class="px-5 py-2 rounded-full text-sm font-medium border transition ' + (isActive ? color.filterActive + ' border-transparent' : color.filterInactive + ' hover:opacity-80') + '">' + cat.label + ' (' + count + ')</button>';
            }
            bar.innerHTML = html;
        }

        function setFilter(f) {
            activeFilter = f;
            renderFilters();
            renderContent();
            lucide.createIcons();
        }

        function renderContent() {
            const container = document.getElementById('content');
            const cats = Object.keys(data.categories);
            const filteredCats = activeFilter === 'all' ? cats : [activeFilter];
            let html = '';
            for (const key of filteredCats) {
                const cat = data.categories[key];
                const color = getColor(key);
                const pages = data.pages.filter(p => p.category === key).sort((a, b) => b.date.localeCompare(a.date));
                if (pages.length === 0) continue;
                html += '<section class="mb-14"><div class="flex items-center gap-3 mb-6"><div class="w-10 h-10 rounded-xl bg-gradient-to-br ' + color.gradient + ' flex items-center justify-center text-white"><i data-lucide="' + (cat.icon || 'file-text') + '" class="w-5 h-5"></i></div><div><h2 class="text-2xl font-bold text-slate-800">' + cat.label + '</h2><p class="text-sm text-slate-500">' + cat.description + '</p></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
                for (const page of pages) {
                    const dateStr = new Date(page.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                    const tagsHtml = (page.tags || []).map(t => '<span class="tag inline-block text-xs px-2 py-0.5 rounded-full ' + color.tag + '">' + t + '</span>').join(' ');
                    html += '<a href="' + page.file + '" class="card-link block bg-white rounded-2xl shadow-sm hover:shadow-lg border border-slate-100 ' + color.border + ' overflow-hidden"><div class="h-1.5 bg-gradient-to-r ' + color.gradient + '"></div><div class="p-6"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold uppercase tracking-wider ' + color.badge + ' px-3 py-1 rounded-full">' + cat.label + '</span><span class="text-xs text-slate-400">' + dateStr + '</span></div><h3 class="text-lg font-bold text-slate-800 mb-2">' + page.title + '</h3><p class="text-sm text-slate-500 leading-relaxed mb-4">' + page.description + '</p><div class="flex flex-wrap gap-1.5">' + tagsHtml + '</div></div></a>';
                }
                html += '</div></section>';
            }
            if (!html) html = '<p class="text-center text-slate-400 py-12">No pages found in this category yet.</p>';
            container.innerHTML = html;
        }

        loadData();
    </script>
</body>
</html>
